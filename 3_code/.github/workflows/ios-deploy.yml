name: Build iOS App

on:
  workflow_dispatch:   # Manual trigger from GitHub Actions UI
  push:
    branches:
      - main
    paths:
      - 'frontend/src/**'
      - 'frontend/ios/**'
      - 'frontend/capacitor.config.json'

jobs:
  build:
    runs-on: macos-latest

    steps:
      # ── 1. Checkout ─────────────────────────────────────────────────
      - name: 🏗 Setup repository
        uses: actions/checkout@v4

      # ── 2. Node ─────────────────────────────────────────────────────
      - name: 🏗 Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      # ── 3. Build web app ────────────────────────────────────────────
      - name: 📦 Install dependencies
        working-directory: frontend
        run: npm ci

      - name: 🔨 Build web assets
        working-directory: frontend
        run: npm run build
        env:
          VITE_GOOGLE_CLIENT_ID: ${{ secrets.VITE_GOOGLE_CLIENT_ID }}

      # ── 4. Sync Capacitor → iOS ─────────────────────────────────────
      - name: 🔄 Sync Capacitor to iOS
        working-directory: frontend
        run: npx cap sync ios

      # ── 5. CocoaPods ────────────────────────────────────────────────
      - name: 🍫 Install CocoaPods
        working-directory: frontend/ios/App
        run: pod install --repo-update

      # ── 6. Import Certificate & Provisioning Profile ─────────────────
      - name: 🔐 Import Apple certificate
        env:
          CERTIFICATE_BASE64: ${{ secrets.APPLE_DISTRIBUTION_CERT_BASE64 }}
          CERTIFICATE_PASSWORD: ${{ secrets.APPLE_DISTRIBUTION_CERT_PASSWORD }}
          KEYCHAIN_PASSWORD: temp-keychain-pass
        run: |
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          echo "$CERTIFICATE_BASE64" | base64 --decode > certificate.p12
          security import certificate.p12 -k build.keychain -P "$CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" build.keychain

      - name: 📋 Install provisioning profile
        env:
          PROVISIONING_PROFILE_BASE64: ${{ secrets.APPLE_PROVISIONING_PROFILE_BASE64 }}
        run: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "$PROVISIONING_PROFILE_BASE64" | base64 --decode > ~/Library/MobileDevice/Provisioning\ Profiles/profile.mobileprovision

      # ── 7. Build & Archive ──────────────────────────────────────────
      - name: 🏗 Build iOS archive
        working-directory: frontend/ios/App
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          xcodebuild archive \
            -workspace App.xcworkspace \
            -scheme App \
            -configuration Release \
            -archivePath "$RUNNER_TEMP/App.xcarchive" \
            -destination "generic/platform=iOS" \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            DEVELOPMENT_TEAM="$APPLE_TEAM_ID" \
            -allowProvisioningUpdates

      # ── 8. Export IPA ───────────────────────────────────────────────
      - name: 📦 Export IPA
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          cat > /tmp/ExportOptions.plist << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0"><dict>
            <key>method</key><string>app-store</string>
            <key>teamID</key><string>$APPLE_TEAM_ID</string>
          </dict></plist>
          EOF
          xcodebuild -exportArchive \
            -archivePath "$RUNNER_TEMP/App.xcarchive" \
            -exportPath "$RUNNER_TEMP/ipa" \
            -exportOptionsPlist /tmp/ExportOptions.plist

      # ── 9. Upload to TestFlight ─────────────────────────────────────
      - name: 🚀 Submit to TestFlight
        env:
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_PRIVATE_KEY: ${{ secrets.APP_STORE_CONNECT_PRIVATE_KEY }}
        run: |
          echo "$APP_STORE_CONNECT_PRIVATE_KEY" > /tmp/AuthKey_$APP_STORE_CONNECT_KEY_ID.p8
          xcrun altool --upload-app \
            --type ios \
            --file "$RUNNER_TEMP/ipa/App.ipa" \
            --apiKey "$APP_STORE_CONNECT_KEY_ID" \
            --apiIssuer "$APP_STORE_CONNECT_ISSUER_ID" \
            --apiPrivateKey "/tmp/AuthKey_$APP_STORE_CONNECT_KEY_ID.p8"

      # ── 10. Save IPA as downloadable artifact ───────────────────────
      - name: 📤 Upload IPA artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: aumtech-ios-build-${{ github.run_number }}
          path: ${{ runner.temp }}/ipa/*.ipa
          retention-days: 30
