<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>PrepNex | Secure Portal Access</title>
    <!-- Premium Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            /* Aumtech.ai Brand Palette (Light Mode) */
            --brand-primary: #1a73e8;
            --brand-slate-900: #0f172a;
            --brand-slate-600: #475569;
            --brand-slate-100: #f1f5f9;
            --bg-base: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #0f172a;
            --text-dim: #64748b;
            --glass-blur: blur(24px);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg-base);
            color: var(--text-main);
            display: flex; align-items: center; justify-content: center; height: 100vh;
            background-image: 
                radial-gradient(circle at 0% 0%, rgba(26, 115, 232, 0.05) 0%, transparent 40%),
                radial-gradient(circle at 100% 100%, rgba(79, 70, 229, 0.05) 0%, transparent 40%);
        }

        .login-card {
            width: 100%; max-width: 460px; background: var(--card-bg); padding: 60px;
            border-radius: 24px; border: 1px solid #e2e8f0;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.08);
            text-align: center; position: relative; overflow: hidden;
            animation: fadeInScale 0.6s cubic-bezier(0.165, 0.84, 0.44, 1);
        }

        .login-card::before {
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 6px;
            background: var(--aura-gradient);
        }

        .logo-box {
            width: 80px; height: 80px; margin: 0 auto 30px;
            border-radius: 12px; overflow: hidden;
            box-shadow: 0 8px 20px rgba(0,0,0,0.05);
            transition: transform 0.3s;
        }
        .logo-box img { width: 100%; height: 100%; object-fit: cover; }

        h2 { font-family: 'Outfit'; font-size: 2.2rem; margin-bottom: 12px; font-weight: 800; letter-spacing: -1px; }
        p { color: var(--text-dim); font-size: 1.05rem; margin-bottom: 45px; font-weight: 500; }

        .form-group { text-align: left; margin-bottom: 30px; }
        label { display: block; font-size: 0.75rem; font-weight: 800; color: #475569; margin-bottom: 12px; text-transform: uppercase; letter-spacing: 2px; }
        
        input {
            width: 100%; padding: 16px 20px; border-radius: 12px;
            border: 1.5px solid #e2e8f0; background: #fff;
            font-size: 1rem; outline: none; transition: all 0.2s ease;
            color: var(--text-main); font-family: inherit;
        }
        input:focus { border-color: var(--brand-primary); box-shadow: 0 0 0 4px rgba(26, 115, 232, 0.1); }

        .btn-login {
            width: 100%; padding: 18px; background: var(--brand-slate-900);
            color: white; border: none; border-radius: 12px;
            font-size: 1.1rem; font-weight: 700; cursor: pointer;
            margin-top: 25px; box-shadow: 0 10px 25px rgba(0,0,0,0.15);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            font-family: 'Outfit';
        }
        .btn-login:hover { transform: translateY(-2px); background: #000; box-shadow: 0 15px 30px rgba(0,0,0,0.2); }
        .btn-login:active { transform: scale(0.98); }
        .btn-login:disabled { opacity: 0.6; transform: none; cursor: wait; }

        #auth-error { display:none; color:#fb7185; background:rgba(251, 113, 133, 0.1); padding: 18px; border-radius: 16px; font-size: 0.95rem; margin-bottom: 30px; border: 1px solid rgba(251, 113, 133, 0.2); font-weight: 600; }

        .footer { margin-top: 50px; font-size: 0.85rem; color: #475569; font-weight: 600; }
        .footer b { color: var(--text-dim); }

        @keyframes fadeInScale {
            from { opacity: 0; transform: scale(0.95) translateY(20px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

    </style>
</head>
<body>

    <div class="login-card">
        <div class="logo-box">
            <img src="https://www.aumtech.ai/assets/logo-CRMbVOkl.png" alt="Aumtech Logo">
        </div>
        <h2>System Access</h2>
        <p>Unlock your elite college pathfinder.</p>

        <div id="auth-error">Authentication failed. Verify credentials.</div>

        <div class="form-group">
            <label>Educational Email</label>
            <input type="email" id="email" placeholder="alex.davis@example.com" required autocomplete="email">
        </div>

        <div class="form-group">
            <label>Pathfinder Password</label>
            <input type="password" id="password" placeholder="••••••••" required autocomplete="current-password">
        </div>

        <button class="btn-login" id="login-btn">Initialize Connection</button>
        
        <div class="footer">
            Powered by <b>Vesta Intelligence Layer</b><br>
            <span style="font-size:0.75rem; letter-spacing:0.5px; margin-top:8px; display:inline-block; opacity:0.8;">DEMOCRATIZING ELITE ADMISSIONS STRATEGY v2.4.2</span>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script type="module" src="/src/PREPNEX_AUTH_LOGIC.js"></script>
    <script>
        lucide.createIcons();
    </script>
</body>
</html>
