<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>PrepNex | Strategic Roadmap</title>
    <!-- Premium Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --primary: #1a73e8;
            --primary-dark: #1557b0;
            --bg-body: #f8fafc;
            --sidebar-bg: #ffffff;
            --text-main: #0f172a;
            --text-dim: #64748b;
            --border: #e2e8f0;
            --hero-gradient: linear-gradient(135deg, #1a73e8 0%, #4f46e5 100%);
            --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.05);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg-body);
            color: var(--text-main);
            display: flex; height: 100vh; overflow: hidden;
        }

        /* SIDEBAR: Unified Professional Style */
        aside {
            width: 280px; background-color: var(--sidebar-bg);
            border-right: 1px solid var(--border);
            padding: 32px 24px; display: flex; flex-direction: column; gap: 32px;
            box-shadow: 4px 0 10px rgba(0,0,0,0.02);
            z-index: 100;
        }
        .logo-section { display: flex; align-items: center; gap: 10px; margin-bottom: 20px; }
        .logo-section img { height: 32px; border-radius: 8px; }
        .logo-text { font-family: 'Outfit'; font-size: 1.4rem; font-weight: 800; color: var(--text-main); letter-spacing: -0.5px; }
        .logo-text span { font-weight: 400; opacity: 0.6; margin-left: -5px; }

        .nav-group { display: flex; flex-direction: column; gap: 6px; }
        .nav-label { font-size: 0.7rem; font-weight: 800; color: #94a3b8; text-transform: uppercase; letter-spacing: 1.5px; margin: 12px 0 8px 12px; }
        .nav-item {
            padding: 12px 16px; border-radius: 12px; color: var(--text-dim);
            text-decoration: none; display: flex; align-items: center; gap: 12px;
            font-weight: 600; font-size: 0.9rem; transition: all 0.2s ease;
        }
        .nav-item:hover { background: #f8fafc; color: var(--primary); }
        .nav-item.active { background: #f1f5f9; color: var(--primary); border: 1px solid #e2e8f0; }

        main { flex: 1; padding: 40px; overflow-y: auto; background: #ffffff; }

        header { margin-bottom: 40px; display: flex; justify-content: space-between; align-items: center; }
        h1 { font-family: 'Outfit'; font-size: 2rem; font-weight: 800; letter-spacing: -1px; }

        .roadmap-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 24px; }
        .year-card { background: #ffffff; border: 1px solid var(--border); border-radius: 20px; padding: 24px; box-shadow: var(--shadow-md); transition: transform 0.3s ease; }
        .year-card:hover { transform: translateY(-3px); }
        .year-label { font-size: 0.75rem; font-weight: 800; color: var(--text-dim); text-transform: uppercase; margin-bottom: 16px; display: block; border-bottom: 1px solid #f1f5f9; padding-bottom: 8px; }
        
        .slot-box { padding: 12px; border-radius: 12px; background: #f8fafc; margin-bottom: 12px; }
        .slot-box.active { background: rgba(79, 70, 229, 0.05); border: 1px solid rgba(79, 70, 229, 0.2); }
        .course-name { font-size: 0.9rem; font-weight: 700; color: var(--text-main); }
        .course-status { font-size: 0.7rem; font-weight: 800; color: var(--primary); margin-top: 4px; display: block; }
    </style>
</head>
<body>
    <aside>
        <div class="logo-section" style="margin-bottom: 32px;">
            <img src="https://www.aumtech.ai/assets/logo-CRMbVOkl.png" alt="Aumtech Logo" style="height:40px; border-radius:10px;">
            <div style="font-family:'Outfit'; font-size:1.3rem; font-weight:800; color:var(--text-main); letter-spacing:-0.5px;">prep.aumtech.ai</div>
        </div>
        <div class="nav-group">
            <div class="nav-label">Main Console</div>
            <a href="/dashboard" class="nav-item"><i data-lucide="layout-dashboard"></i> Dashboard</a>
            <a href="/vesta" class="nav-item"><i data-lucide="sparkles"></i> Vesta AI Hub</a>
        </div>
        <div class="nav-group">
            <div class="nav-label">Strategic Center</div>
            <a href="/roadmap" class="nav-item active"><i data-lucide="map"></i> Strategic Roadmap</a>
            <a href="/tracker" class="nav-item"><i data-lucide="target"></i> University Tracker</a>
            <a href="/essays" class="nav-item"><i data-lucide="pen-tool"></i> Essay Architect</a>
        </div>
        <div class="nav-group">
            <div class="nav-label">Admissions Track</div>
            <a href="/testing" class="nav-item"><i data-lucide="target"></i> Testing Strategy</a>
            <a href="/profile" class="nav-item"><i data-lucide="award"></i> Profile Impact</a>
            <a href="/coaching" class="nav-item"><i data-lucide="users"></i> Aura Coaching</a>
        </div>
        <div style="margin-top:auto;"><a href="/" class="nav-item" style="color:#ef4444;"><i data-lucide="log-out"></i> Logout</a></div>
    </aside>

    <main>
        <header>
            <div>
                <h1>Strategic Roadmap</h1>
                <p style="color:var(--text-dim); font-size:0.95rem;">Automated Academic Acceleration Plan</p>
            </div>
            <button class="btn-primary" id="sync-pathway-btn" style="background: var(--hero-gradient); border: none; color: white; padding: 12px 24px; border-radius: 50px; font-weight: 800; cursor: pointer; display: flex; align-items: center; gap: 8px;">
                <i data-lucide="refresh-cw" style="width: 18px;"></i> Sync Pathway
            </button>
        </header>

        <div class="roadmap-grid">
            <!-- Dynamic Content -->
        </div>

        <!-- Add Course Modal -->
        <div id="course-modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(15, 23, 42, 0.6); backdrop-filter:blur(4px); z-index:1000; display:none; align-items:center; justify-content:center;">
            <div style="background:white; padding:40px; border-radius:28px; width:400px; box-shadow:0 25px 50px -12px rgba(0,0,0,0.25);">
                <h3 style="font-family:'Outfit'; font-size:1.5rem; margin-bottom:24px;">Add Strategic Course</h3>
                <div style="display:flex; flex-direction:column; gap:20px;">
                    <div>
                        <label style="font-size:0.75rem; font-weight:800; color:var(--text-dim); text-transform:uppercase; display:block; margin-bottom:8px;">Course Name</label>
                        <input type="text" id="modal-course-name" placeholder="e.g. AP Calculus BC" style="width:100%; padding:12px; border:1px solid var(--border); border-radius:12px; font-family:inherit;">
                    </div>
                    <div>
                        <label style="font-size:0.75rem; font-weight:800; color:var(--text-dim); text-transform:uppercase; display:block; margin-bottom:8px;">Status</label>
                        <select id="modal-status" style="width:100%; padding:12px; border:1px solid var(--border); border-radius:12px; font-family:inherit;">
                            <option value="planned">Planned</option>
                            <option value="active">Active</option>
                            <option value="completed">Completed</option>
                        </select>
                    </div>
                    <div id="grade-field" style="display:none;">
                        <label style="font-size:0.75rem; font-weight:800; color:var(--text-dim); text-transform:uppercase; display:block; margin-bottom:8px;">Final Grade</label>
                        <input type="text" id="modal-grade" placeholder="e.g. A" style="width:100%; padding:12px; border:1px solid var(--border); border-radius:12px; font-family:inherit;">
                    </div>
                    <div style="display:flex; gap:12px; margin-top:12px;">
                        <button id="modal-cancel" style="flex:1; padding:12px; border-radius:12px; border:1px solid var(--border); background:white; cursor:pointer; font-weight:700;">Cancel</button>
                        <button id="modal-save" style="flex:1; padding:12px; border-radius:12px; border:none; background:var(--hero-gradient); color:white; cursor:pointer; font-weight:800;">Save Course</button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script type="module">
        import { getAcademicRoadmap, addAcademicCourse, performPathwaySync } from '/src/PREPNEX_VESTA_LOGIC.js';

        let activeStudentId = null;
        let activeGradeForModal = null;

        const modal = document.getElementById('course-modal');
        const modalStatus = document.getElementById('modal-status');
        const gradeField = document.getElementById('grade-field');

        modalStatus.addEventListener('change', () => {
            gradeField.style.display = modalStatus.value === 'completed' ? 'block' : 'none';
        });

        function persistStudentIdInNav(studentId) {
            document.querySelectorAll('.nav-item').forEach(link => {
                const href = link.getAttribute('href');
                if (href && href !== '#' && !href.includes('logout')) {
                    const url = new URL(href, window.location.origin);
                    url.searchParams.set('id', studentId);
                    link.setAttribute('href', url.toString());
                }
            });
        }

        async function hydrateRoadmap() {
            const urlParams = new URLSearchParams(window.location.search);
            activeStudentId = urlParams.get('id');
            if (activeStudentId) {
                persistStudentIdInNav(activeStudentId);
                try {
                    const roadmap = await getAcademicRoadmap(activeStudentId);
                    const grid = document.querySelector('.roadmap-grid');
                    grid.innerHTML = '';
                    
                    const sorted = roadmap.sort((a,b) => a.grade_level - b.grade_level);
                    const groups = {};
                    // Ensure all grades from 6 to 12 are present
                    for(let i=6; i<=12; i++) groups[i] = [];
                    
                    sorted.forEach(c => {
                        if(groups[c.grade_level]) groups[c.grade_level].push(c);
                    });

                    Object.keys(groups).forEach(grade => {
                        const card = document.createElement('div');
                        card.className = 'year-card';
                        let slots = '';
                        groups[grade].forEach(course => {
                            slots += `
                                <div class="slot-box ${course.status === 'active' ? 'active' : ''}">
                                    <span class="course-name">${course.course_name}</span>
                                    <span class="course-status">${course.status === 'active' ? 'IN PROGRESS' : (course.grade || 'PLANNED')}</span>
                                </div>
                            `;
                        });
                        card.innerHTML = `
                            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:16px; border-bottom:1px solid #f1f5f9; padding-bottom:8px;">
                                <span class="year-label" style="margin-bottom:0; border:none;">Grade ${grade}</span>
                                <button class="add-btn" data-grade="${grade}" style="background:none; border:none; color:var(--primary); cursor:pointer;"><i data-lucide="plus-circle" style="width:18px;"></i></button>
                            </div>
                            ${slots}
                        `;
                        grid.appendChild(card);
                    });

                    document.querySelectorAll('.add-btn').forEach(btn => {
                        btn.addEventListener('click', () => {
                            activeGradeForModal = btn.dataset.grade;
                            modal.style.display = 'flex';
                        });
                    });

                } catch (e) { console.error(e); }
            }
            lucide.createIcons();
        }

        document.getElementById('modal-cancel').addEventListener('click', () => {
            modal.style.display = 'none';
        });

        document.getElementById('modal-save').addEventListener('click', async () => {
            const name = document.getElementById('modal-course-name').value;
            const status = modalStatus.value;
            const grade = document.getElementById('modal-grade').value;

            if(!name) return alert("Please enter a course name");

            try {
                await addAcademicCourse(activeStudentId, {
                    course_name: name,
                    grade_level: activeGradeForModal,
                    status: status,
                    grade: status === 'completed' ? grade : null
                });
                modal.style.display = 'none';
                hydrateRoadmap();
            } catch (e) {
                alert("Failed to save course.");
            }
        });

        document.getElementById('sync-pathway-btn').addEventListener('click', async () => {
            const btn = document.getElementById('sync-pathway-btn');
            btn.style.opacity = '0.5';
            try {
                const newScore = await performPathwaySync(activeStudentId);
                alert(`Pathway Synced. New Ivy Alignment Score: ${newScore}%`);
            } catch (e) {
                alert("Sync failed.");
            } finally {
                btn.style.opacity = '1';
            }
        });

        hydrateRoadmap();
    </script>
</body>
</html>
