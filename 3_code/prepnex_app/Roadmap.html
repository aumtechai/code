<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>PrepNex | Strategic Roadmap</title>
    <!-- Premium Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --primary: #4f46e5;
            --primary-dark: #3730a3;
            --accent: #7c3aed;
            --bg-body: #f1f5f9;
            --sidebar-bg: #ffffff;
            --text-main: #0f172a;
            --text-dim: #64748b;
            --border: #e2e8f0;
            --hero-gradient: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
            --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg-body);
            color: var(--text-main);
            display: flex; height: 100vh; overflow: hidden;
        }

        /* SIDEBAR: Unified Professional Style */
        aside {
            width: 280px; background-color: var(--sidebar-bg);
            border-right: 1px solid var(--border);
            padding: 32px 24px; display: flex; flex-direction: column; gap: 32px;
            box-shadow: 4px 0 10px rgba(0,0,0,0.02);
            z-index: 100;
        }
        .logo-section { display: flex; align-items: center; gap: 12px; margin-bottom: 8px; }
        .logo-icon { width: 34px; height: 34px; background: var(--hero-gradient); border-radius: 10px; display: flex; align-items: center; justify-content: center; color: white; box-shadow: 0 4px 12px rgba(79, 70, 229, 0.25); }
        .logo-text { font-family: 'Outfit'; font-size: 1.3rem; font-weight: 800; color: var(--text-main); letter-spacing: -0.5px; }

        .nav-group { display: flex; flex-direction: column; gap: 6px; }
        .nav-label { font-size: 0.7rem; font-weight: 800; color: #94a3b8; text-transform: uppercase; letter-spacing: 1.5px; margin: 12px 0 8px 12px; }
        .nav-item {
            padding: 12px 16px; border-radius: 12px; color: var(--text-dim);
            text-decoration: none; display: flex; align-items: center; gap: 12px;
            font-weight: 600; font-size: 0.9rem; transition: all 0.2s ease;
        }
        .nav-item:hover { background: #f8fafc; color: var(--primary); }
        .nav-item.active { background: rgba(79, 70, 229, 0.08); color: var(--primary); }

        main { flex: 1; padding: 40px; overflow-y: auto; background: #ffffff; }

        header { margin-bottom: 40px; display: flex; justify-content: space-between; align-items: center; }
        h1 { font-family: 'Outfit'; font-size: 2rem; font-weight: 800; letter-spacing: -1px; }

        .roadmap-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 24px; }
        .year-card { background: #ffffff; border: 1px solid var(--border); border-radius: 20px; padding: 24px; box-shadow: var(--shadow-md); transition: transform 0.3s ease; }
        .year-card:hover { transform: translateY(-3px); }
        .year-label { font-size: 0.75rem; font-weight: 800; color: var(--text-dim); text-transform: uppercase; margin-bottom: 16px; display: block; border-bottom: 1px solid #f1f5f9; padding-bottom: 8px; }
        
        .slot-box { padding: 12px; border-radius: 12px; background: #f8fafc; margin-bottom: 12px; }
        .slot-box.active { background: rgba(79, 70, 229, 0.05); border: 1px solid rgba(79, 70, 229, 0.2); }
        .course-name { font-size: 0.9rem; font-weight: 700; color: var(--text-main); }
        .course-status { font-size: 0.7rem; font-weight: 800; color: var(--primary); margin-top: 4px; display: block; }
    </style>
</head>
<body>
    <aside>
        <div class="logo-section">
            <div class="logo-icon"><i data-lucide="sparkle" style="width:20px;"></i></div>
            <div class="logo-text">PrepNex</div>
        </div>
        <div class="nav-group">
            <div class="nav-label">Main Console</div>
            <a href="Dashboard.html" class="nav-item"><i data-lucide="layout-dashboard"></i> Dashboard</a>
            <a href="Vesta.html" class="nav-item"><i data-lucide="sparkles"></i> Vesta AI Hub</a>
        </div>
        <div class="nav-group">
            <div class="nav-label">Admissions Track</div>
            <a href="Roadmap.html" class="nav-item active"><i data-lucide="map"></i> Strategic Roadmap</a>
            <a href="Testing.html" class="nav-item"><i data-lucide="target"></i> Testing Strategy</a>
            <a href="Profile.html" class="nav-item"><i data-lucide="award"></i> Profile Impact</a>
            <a href="Coaching.html" class="nav-item"><i data-lucide="users"></i> Aura Coaching</a>
        </div>
        <div style="margin-top:auto;"><a href="/" class="nav-item" style="color:#ef4444;"><i data-lucide="log-out"></i> Logout</a></div>
    </aside>

    <main>
        <header>
            <div>
                <h1>Strategic Roadmap</h1>
                <p style="color:var(--text-dim); font-size:0.95rem;">Automated Academic Acceleration Plan</p>
            </div>
        </header>

        <div class="roadmap-grid">
            <!-- Dynamic Content -->
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script type="module">
        import { getAcademicRoadmap } from '/src/PREPNEX_VESTA_LOGIC.js';

        function persistStudentIdInNav(studentId) {
            document.querySelectorAll('.nav-item').forEach(link => {
                const href = link.getAttribute('href');
                if (href && href !== '#' && !href.includes('logout')) {
                    const url = new URL(href, window.location.origin);
                    url.searchParams.set('id', studentId);
                    link.setAttribute('href', url.toString());
                }
            });
        }

        async function hydrateRoadmap() {
            const urlParams = new URLSearchParams(window.location.search);
            const studentId = urlParams.get('id');
            if (studentId) {
                persistStudentIdInNav(studentId);
                try {
                    const roadmap = await getAcademicRoadmap(studentId);
                    const grid = document.querySelector('.roadmap-grid');
                    grid.innerHTML = '';
                    
                    // Group by grade
                    const sorted = roadmap.sort((a,b) => a.grade_level - b.grade_level);
                    const groups = {};
                    sorted.forEach(c => {
                        if(!groups[c.grade_level]) groups[c.grade_level] = [];
                        groups[c.grade_level].push(c);
                    });

                    Object.keys(groups).forEach(grade => {
                        const card = document.createElement('div');
                        card.className = 'year-card';
                        let slots = '';
                        groups[grade].forEach(course => {
                            slots += `
                                <div class="slot-box ${course.status === 'active' ? 'active' : ''}">
                                    <span class="course-name">${course.course_name}</span>
                                    <span class="course-status">${course.status === 'active' ? 'IN PROGRESS' : (course.grade || 'PLANNED')}</span>
                                </div>
                            `;
                        });
                        card.innerHTML = `<span class="year-label">Grade ${grade}</span>${slots}`;
                        grid.appendChild(card);
                    });
                } catch (e) { }
            }
            lucide.createIcons();
        }
        hydrateRoadmap();
    </script>
</body>
</html>
