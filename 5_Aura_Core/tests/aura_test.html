<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aura Core - Specialist Swarm Validation Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0b0e14;
            --surface: #161b22;
            --accent: #3fb950;
            --text-primary: #e6edf3;
            --text-secondary: #8b949e;
            --border: #30363d;
            --aura-blue: #0ea5e9;
            --aura-purple: #8b5cf6;
        }

        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            padding: 1rem 2rem;
            background: var(--surface);
            border-bottom: 2px solid var(--aura-blue);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        main {
            padding: 2rem;
            max-width: 1600px;
            margin: 0 auto;
            width: calc(100% - 4rem);
            display: flex;
            flex-direction: column;
            gap: 2rem;
        }

        .dashboard-grid {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 2rem;
        }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1.5rem;
        }

        .validation-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 1rem;
            font-size: 0.85rem;
        }

        .validation-table th {
            text-align: left;
            padding: 0.75rem;
            border-bottom: 2px solid var(--border);
            color: var(--text-secondary);
        }

        .validation-table td {
            padding: 0.75rem;
            border-bottom: 1px solid var(--border);
        }

        .badge {
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.7rem;
            font-weight: 600;
        }

        .success { background: rgba(63, 185, 80, 0.1); color: var(--accent); border: 1px solid var(--accent); }
        .running { background: rgba(14, 165, 233, 0.1); color: var(--aura-blue); border: 1px solid var(--aura-blue); }
        .time-cell { font-family: 'JetBrains Mono', monospace; font-weight: 600; }

        .chat-view {
            max-height: 500px;
            overflow-y: auto;
            background: #000;
            padding: 1rem;
            border-radius: 8px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.8rem;
            margin-top: 1rem;
            border: 1px solid var(--border);
        }

        button.primary {
            background: var(--aura-blue);
            color: white;
            border: none;
            padding: 0.75rem 2rem;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
        }

        .audit-entry {
            padding: 0.75rem;
            border-bottom: 1px solid var(--border);
            font-size: 0.75rem;
        }
    </style>
</head>
<body>
    <header>
        <div style="display: flex; align-items: center; gap: 1rem;">
            <div style="width: 40px; height: 40px; background: linear-gradient(135deg, var(--aura-blue), var(--aura-purple)); border-radius: 10px;"></div>
            <h1 style="font-size: 1.4rem; margin: 0;">Aura Core <span style="font-weight: 300; opacity: 0.7;">| Specialist Swarm Validation</span></h1>
        </div>
        <div style="display: flex; gap: 1rem;">
            <button class="primary" style="background: var(--aura-purple);" onclick="startSingleTest()" id="singleBtn">Single User Test (Dual Agent)</button>
            <button class="primary" onclick="startBatchTest()" id="runBtn">Run Full Validation Cycle (10 Scenarios)</button>
        </div>
    </header>

    <main>
        <div class="card">
            <h2 style="font-size: 1rem; margin-top: 0;">Live Swarm Execution Console</h2>
            <div id="executionConsole" class="chat-view">
                System Initialized. Waiting for validation cycle start...
            </div>
        </div>

        <div class="dashboard-grid">
            <div class="card">
                <h2 style="font-size: 1rem; margin-top: 0;">Validation Dashboard</h2>
                <table class="validation-table" id="validationTable">
                    <thead>
                        <tr>
                            <th>Student ID</th>
                            <th>Test Query</th>
                            <th>Summoned Agents</th>
                            <th>Latency</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody">
                        <tr><td colspan="5" style="text-align: center; color: var(--text-secondary); padding: 2rem;">No validation run in progress</td></tr>
                    </tbody>
                </table>
            </div>

            <div class="card">
                <h2 style="font-size: 1rem; margin-top: 0;">Historical Audit Logs</h2>
                <div id="auditContainer" style="max-height: 400px; overflow-y: auto;">
                    <!-- Audits appear here -->
                </div>
            </div>
        </div>
    </main>

    <script>
        const SCENARIOS = [
            { email: "erin.carlson1@txu.edu", query: "What is my current GPA and do I have tuition dues?" },
            { email: "david.smith1@txu.edu", query: "When is my next advising appointment?" },
            { email: "maria.garcia1@txu.edu", query: "What is my current academic standing and do I have any holds?" },
            { email: "james.wilson1@txu.edu", query: "Are there any career placement opportunities matching my major?" },
            { email: "sarah.miller1@txu.edu", query: "What are my total credits earned vs required for graduation?" },
            { email: "michael.brown1@txu.edu", query: "What was my last financial transaction and current net due?" },
            { email: "emily.davis1@txu.edu", query: "Can you recommend courses for my next semester based on my audit?" },
            { email: "robert.jones1@txu.edu", query: "I'm interested in peer mentoring, do I qualify based on my GPA?" },
            { email: "jennifer.taylor1@txu.edu", query: "Did my financial aid reward cover my last semester fees?" },
            { email: "william.martinez1@txu.edu", query: "Does Texan University have career fairs or placements for me?" }
        ];

        function log(msg, color='var(--text-primary)') {
            const console = document.getElementById('executionConsole');
            console.innerHTML += `<div style="color: ${color}; margin-bottom: 4px;">[${new Date().toLocaleTimeString()}] ${msg}</div>`;
            console.scrollTop = console.scrollHeight;
        }

        async function startSingleTest() {
            const btn = document.getElementById('singleBtn');
            const tbody = document.getElementById('tableBody');
            const scenario = { email: "erin.carlson1@txu.edu", query: "What is my current GPA and do I have tuition dues?" };
            
            btn.disabled = true;
            btn.innerText = "Running Single Test...";
            tbody.innerHTML = `
                <tr id="single-row">
                    <td>${scenario.email}</td>
                    <td>${scenario.query}</td>
                    <td class="agents-cell">Pending...</td>
                    <td class="time-cell">--</td>
                    <td><span class="badge running">Running</span></td>
                </tr>
            `;
            log("Starting Single User (Dual Agent) Validation...", "var(--aura-purple)");

            try {
                const res = await fetch('http://localhost:8001/api/aura-core/query', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ query: scenario.query, email: scenario.email })
                });
                const data = await res.json();
                
                const row = document.getElementById('single-row');
                if(data.status === 'success') {
                    row.querySelector('.agents-cell').innerHTML = data.flow_log.filter(f => f.sender !== 'Aura_Master').map(f => f.sender).join(', ');
                    row.querySelector('.time-cell').innerText = `${data.processing_seconds.toFixed(2)}s`;
                    row.querySelector('td:last-child').innerHTML = `<span class="badge success">Success</span>`;
                    log(`Single Test Success in ${data.processing_seconds.toFixed(2)}s`, "var(--accent)");
                } else {
                    row.querySelector('td:last-child').innerHTML = `<span class="badge" style="color: red; border: 1px solid red;">Error</span>`;
                    log(`Single Test Failed: ${data.message || data.detail || 'Internal Server Error'}`, "red");
                }
            } catch (e) {
                log(`Single Test Connection Failed`, "red");
            }
            
            btn.disabled = false;
            btn.innerText = "Single User Test (Dual Agent)";
            fetchAudits();
        }

        async function startBatchTest() {
            const btn = document.getElementById('runBtn');
            const tbody = document.getElementById('tableBody');
            
            btn.disabled = true;
            btn.innerText = "Validation in Progress...";
            tbody.innerHTML = '';
            log("Starting Specialist Swarm Validation Cycle...", "var(--aura-blue)");

            for (let i = 0; i < SCENARIOS.length; i++) {
                const s = SCENARIOS[i];
                const rowId = `row-${i}`;
                
                tbody.innerHTML += `
                    <tr id="${rowId}">
                        <td>${s.email}</td>
                        <td>${s.query}</td>
                        <td class="agents-cell">Pending...</td>
                        <td class="time-cell">--</td>
                        <td><span class="badge running">Running</span></td>
                    </tr>
                `;

                log(`Executing Scenario ${i+1}: Targeting ${s.email}...`);

                try {
                    const start = performance.now();
                    const res = await fetch('http://localhost:8001/api/aura-core/query', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ query: s.query, email: s.email })
                    });
                    const data = await res.json();
                    const end = performance.now();
                    
                    const row = document.getElementById(rowId);
                    if(data.status === 'success') {
                        row.querySelector('.agents-cell').innerHTML = data.flow_log.filter(f => f.sender !== 'Aura_Master').map(f => f.sender).join(', ');
                        row.querySelector('.time-cell').innerText = `${data.processing_seconds.toFixed(2)}s`;
                        row.querySelector('td:last-child').innerHTML = `<span class="badge success">Success</span>`;
                        log(`Scenario ${i+1} Success in ${data.processing_seconds.toFixed(2)}s`, "var(--accent)");
                    } else {
                        row.querySelector('td:last-child').innerHTML = `<span class="badge" style="color: red; border: 1px solid red;">Error</span>`;
                        log(`Scenario ${i+1} Failed: ${data.message || data.detail || 'Internal Server Error'}`, "red");
                    }
                } catch (e) {
                    log(`Scenario ${i+1} Connection Failed`, "red");
                }

                // Poll audits
                fetchAudits();
                
                // Rate Limit Delay: Wait 5 seconds before next scenario
                await new Promise(resolve => setTimeout(resolve, 5000));
            }

            btn.disabled = false;
            btn.innerText = "Run Full Validation Cycle (10 Scenarios)";
            log("Validation Cycle Complete.", "var(--aura-purple)");
        }

        async function fetchAudits() {
            try {
                const res = await fetch('http://localhost:8001/api/aura-core/audit');
                const data = await res.json();
                const container = document.getElementById('auditContainer');
                container.innerHTML = '';
                data.reverse().forEach(a => {
                    container.innerHTML += `
                        <div class="audit-entry">
                            <div style="color: var(--aura-blue)">${a.timestamp}</div>
                            <div><b>Agent:</b> ${a.agent} <span style="margin-left: 10px; color: var(--aura-purple)">${a.processing_time}</span></div>
                            <div style="color: var(--text-secondary)">${a.query}</div>
                        </div>
                    `;
                });
            } catch(e) {}
        }

        window.onload = fetchAudits;
    </script>
</body>
</html>
