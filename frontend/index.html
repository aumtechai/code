<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" href="/logo.png" />
  <!-- iOS-optimized viewport with safe area support -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>Student Success Navigator</title>
  
  <!-- iOS Status Bar and Theme -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#4f46e5" />
  
  <!-- iOS Touch Icons -->
  <link rel="apple-touch-icon" href="/logo.png" />
  <link rel="apple-touch-icon" sizes="152x152" href="/logo.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="/logo.png" />
  <link rel="apple-touch-icon" sizes="167x167" href="/logo.png" />
  <script>
    window.addEventListener('error', function(e) {
      document.body.innerHTML = '<div style="color:red; padding:20px; font-family:sans-serif;"><h1>Runtime Error</h1><pre>' + e.message + '\n' + e.filename + ':' + e.lineno + '</pre></div>';
    });
    window.addEventListener('unhandledrejection', function(e) {
      document.body.innerHTML = '<div style="color:red; padding:20px; font-family:sans-serif;"><h1>Promise Error</h1><pre>' + e.reason + '</pre></div>';
    });
  </script>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
